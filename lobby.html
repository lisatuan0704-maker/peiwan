<style>
:root{
  --outline:#5A3D4E; --berry:#FF9EB5; --berry-dk:#D96A8B;
  --milk:#FFFDF8; --ink:#5A3D4E; --ink-soft:#A5798D; --lav:#C3A6EC; --lav-dk:#8E68C8;

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Huninn','Noto Sans TC',sans-serif;color:var(--ink);overflow:hidden;
  background:#3A2312}
/* 大廳舞台 */
#hall{position:fixed;inset:0;overflow:hidden;background:#2A1C24}
#world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#worldbg{position:absolute;left:0;top:0;image-rendering:pixelated;
  background:#5C4032 center/cover no-repeat;background-size:cover}
#fade{position:fixed;inset:0;z-index:80;background:#1E1218;opacity:0;pointer-events:none;transition:opacity .35s}
#fade.on{opacity:1;pointer-events:auto}
.door{position:absolute;z-index:14;cursor:pointer;text-align:center;font-size:26px;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.4))}
.door .dl{font-size:11px;color:#FFE7EF;background:rgba(90,61,78,.85);padding:2px 8px;margin-top:2px;
  letter-spacing:1px;white-space:nowrap}
/* 頂部招牌 */
#sign{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:20;text-align:center}
#sign .plate{display:inline-block;padding:10px 26px;background:var(--berry);color:#fff;font-size:18px;letter-spacing:4px;
  text-shadow:2px 2px 0 var(--berry-dk);
  box-shadow:0 -4px 0 0 var(--outline),0 4px 0 0 var(--outline),-4px 0 0 0 var(--outline),4px 0 0 0 var(--outline),
    inset 0 -4px 0 var(--berry-dk),inset 0 3px 0 rgba(255,255,255,.35)}
#sign .sub{margin-top:8px;font-size:12px;color:#FFE7EF;letter-spacing:2px;text-shadow:1px 1px 0 rgba(0,0,0,.5)}
/* 右下入口鈕 */
#hint2{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:20;
  background:rgba(90,61,78,.82);color:#FFE7EF;font-size:12px;letter-spacing:1px;padding:7px 16px;
  box-shadow:0 -2px 0 0 rgba(0,0,0,.3),0 2px 0 0 rgba(0,0,0,.3),-2px 0 0 0 rgba(0,0,0,.3),2px 0 0 0 rgba(0,0,0,.3)}
.spot{position:absolute;z-index:15;cursor:pointer}
.spot .fx{position:absolute;left:50%;top:0;transform:translateX(-50%);font-size:22px;opacity:0;pointer-events:none}
.spot .fx.go{animation:heartUp 1.1s ease-out forwards}
@keyframes heartUp{0%{opacity:0;transform:translate(-50%,0) scale(.6)}25%{opacity:1}100%{opacity:0;transform:translate(-50%,-46px) scale(1.15)}}
#joinBtn{position:fixed;right:20px;bottom:20px;z-index:20;padding:12px 18px;border:none;cursor:pointer;
  background:var(--lav);color:#fff;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:2px;
  box-shadow:0 -4px 0 0 var(--outline),0 4px 0 0 var(--outline),-4px 0 0 0 var(--outline),4px 0 0 0 var(--outline),
    0 8px 0 -1px var(--outline),inset 0 -4px 0 var(--lav-dk)}
#joinBtn:active{transform:translateY(4px)}
/* NPC 娃娃 */
.npc{position:absolute;cursor:pointer;text-align:center;will-change:left,top}
.npc:hover .tag{background:var(--berry-dk)}
.npc{transform-style:preserve-3d}
.npc .shadow{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);
  background:rgba(40,20,30,.28);border-radius:50%;filter:blur(1px);pointer-events:none;z-index:-1}
.npc canvas{image-rendering:pixelated;display:block;margin:0 auto;
  transform-origin:50% 100%;transition:none;
  filter:drop-shadow(1px 3px 1px rgba(40,20,30,.25))}
.npc .tag{display:inline-block;margin-top:2px;padding:3px 10px;background:rgba(90,61,78,.88);color:#FFE7EF;
  font-size:12px;letter-spacing:1px;white-space:nowrap;
  box-shadow:0 -2px 0 0 rgba(0,0,0,.3),0 2px 0 0 rgba(0,0,0,.3),-2px 0 0 0 rgba(0,0,0,.3),2px 0 0 0 rgba(0,0,0,.3)}
.npc.staff .tag{background:rgba(47,102,71,.9)}
.npc .led{position:absolute;left:50%;transform:translateX(-50%);top:-26px;
  padding:2px 8px;font-size:11px;white-space:nowrap;letter-spacing:1px;
  background:rgba(40,20,30,.85);color:#fff;display:none}
.npc .led.g{display:block;color:#B6F2C2}
.npc .led.g::before{content:'●';color:#5AE07C;margin-right:4px}
.npc .led.r{display:block;color:#FFC9C9}
.npc .led.r::before{content:'●';color:#FF5A5A;margin-right:4px}
.fx{position:absolute;z-index:40;image-rendering:pixelated;width:48px;height:48px;
  animation:fxpop .42s ease-out forwards;pointer-events:none}
@keyframes fxpop{0%{transform:scale(.4) rotate(0deg);opacity:1}100%{transform:scale(1.5) rotate(90deg);opacity:0}}
/* 名片泡泡 */
#cardOverlay{position:fixed;inset:0;z-index:40;display:none;
  background:rgba(40,20,30,.78);align-items:center;justify-content:center;padding:24px}
#cardOverlay.on{display:flex}
#cardBox{position:relative;max-width:92vw;max-height:88vh}
#cardBox.show{animation:cardIn .34s cubic-bezier(.2,1.3,.4,1)}
@keyframes cardIn{0%{opacity:0;transform:translateY(24px) scale(.86)}100%{opacity:1;transform:translateY(0) scale(1)}}
#popcv{image-rendering:pixelated;display:block;width:auto;height:auto;max-width:92vw;max-height:82vh;
  box-shadow:0 -6px 0 0 var(--outline),0 6px 0 0 var(--outline),-6px 0 0 0 var(--outline),6px 0 0 0 var(--outline),12px 14px 0 0 rgba(0,0,0,.4)}
#cardClose{position:absolute;top:-14px;right:-14px;width:44px;height:44px;border:none;cursor:pointer;
  background:var(--berry-dk);color:#fff;font-size:20px;font-family:inherit;border-radius:50%;
  box-shadow:0 -3px 0 0 var(--outline),0 3px 0 0 var(--outline),-3px 0 0 0 var(--outline),3px 0 0 0 var(--outline)}
#cardClose:active{transform:translateY(2px)}
/* 空大廳 */
#emptyMsg{position:fixed;left:50%;top:55%;transform:translate(-50%,-50%);z-index:5;text-align:center;display:none;
  color:#FFE7EF;text-shadow:2px 2px 0 rgba(0,0,0,.5);font-size:15px;line-height:2;letter-spacing:1px}
#cnt{color:#FFD3DF}
@media(max-width:640px){
  #sign .plate{font-size:14px;padding:8px 16px;letter-spacing:2px}
}
</style>

function P(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function drawBody(ctx,skin,pose){

  P(ctx,21,36+sw,3,9,s);P(ctx,40,36-sw,3,9,s);
  P(ctx,21,45+sw,3,3,s);P(ctx,40,45-sw,3,3,s);
  if(pose==='a'){                                   // 左腳抬、右腳踩

    P(ctx,26,48,5,7,s);P(ctx,25,55,6,3,'#4A3226');
    P(ctx,33,46,5,6,s);P(ctx,33,52,6,3,'#4A3226');
  }else{
    P(ctx,26,48,5,7,s);P(ctx,33,48,5,7,s);
    P(ctx,25,55,6,3,'#4A3226');P(ctx,33,55,6,3,'#4A3226');

  P(ctx,19,29,26,2,sd);
}

const FACES=[

  {d:c=>{P(c,25,20,3,4,'#241407');P(c,35,22,5,2,'#241407');P(c,29,27,5,2,'#A83E2C');P(c,22,25,3,2,'#F0A9A0');}},

const CLOTHS=[

  {d:c=>{P(c,23,34,18,15,'#9E7BE0');P(c,23,34,18,3,'#68459E');P(c,29,37,6,8,'#68459E');P(c,20,36,4,10,'#9E7BE0');P(c,40,36,4,10,'#9E7BE0');}},

const ACCS=[

  {d:c=>{P(c,17,16,4,8,'#37578E');P(c,43,16,4,8,'#37578E');P(c,18,6,28,3,'#37578E');}},
  {d:c=>{P(c,20,3,4,4,'#A83E2C');P(c,21,1,2,3,'#E8705E');P(c,40,3,4,4,'#A83E2C');P(c,41,1,2,3,'#E8705E');}},
];
function drawDollTo(cv, doll, pose){
  const ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,64,64);
  const d=doll||{};
  const hair=HAIRS[d.hair]||HAIRS[0];
  (BACKS[d.back]||BACKS[0]).d(ctx,hair);
  drawBody(ctx, d.skin||0, pose||'idle');
  (CLOTHS[d.cloth]||CLOTHS[0]).d(ctx);
  (FACES[d.face]||FACES[0]).d(ctx);
  (FRONTS[d.front]||FRONTS[0]).d(ctx,hair);
  (ACCS[d.acc]||ACCS[0]).d(ctx);
}

    p[i]=f(0);p[i+1]=f(8);p[i+2]=f(4);
  }

let FLOOR = null;   // 於 MAPS 定義後指定
// 給定 y,回傳該高度地板允許的 x 範圍
function floorXrange(y){
  const t=Math.min(1,Math.max(0,(y-FLOOR.y0)/(FLOOR.y1-FLOOR.y0)));
  return [FLOOR.farX0+(FLOOR.nearX0-FLOOR.farX0)*t,
          FLOOR.farX1+(FLOOR.nearX1-FLOOR.farX1)*t];
}
function clampIn(fl,x,y){
  const cy=Math.min(fl.y1,Math.max(fl.y0,y));
  const t=(cy-fl.y0)/(fl.y1-fl.y0);
  const lo=fl.farX0+(fl.nearX0-fl.farX0)*t, hi=fl.farX1+(fl.nearX1-fl.farX1)*t;
  return [Math.min(hi,Math.max(lo,x)),cy];
}
function clampFloor(x,y){
  const cy=Math.min(FLOOR.y1,Math.max(FLOOR.y0,y));
  const [lo,hi]=floorXrange(cy);
  return [Math.min(hi,Math.max(lo,x)), cy];
}

        let near=null, nd=1e9;
        agents.forEach(o=>{ if(o.slime){
          const d2=Math.hypot((o.x-a.x)*WORLD.w,(o.y-a.y)*WORLD.h);
          if(d2<nd){nd=d2;near=o;} } });
        a.chase=false;
        if(near){
          if(nd>78){
            // 追擊
            a.chase=true;
            const dxp2=(near.x-a.x)*WORLD.w, dyp2=(near.y-a.y)*WORLD.h;
            const sp2=95*depthNow;
            a.x+=dxp2/nd*sp2*dt/WORLD.w; a.y+=dyp2/nd*sp2*dt/WORLD.h;
            if(Math.abs(dxp2)>12){const nl=dxp2<0;if(nl!==a.faceLeft){a.faceLeft=nl;a.flipping=true;}}
          }else{
            // 近身揮擊
            a.hb=(a.hb||0.6)-dt;
            if(a.hb<=0){
              a.atkT=1;
              spawnSlash(near.x, near.y-0.02);
              bopSlime(near);
              if(Math.random()<0.5) spawnHeart(a);
              a.hb=1.5+Math.random()*1.2;
            }
          }
        }else{
          a.hb=(a.hb||2)-dt;
          if(a.hb<=0){ spawnHeart(a); a.hb=3; }
        }
        if(a.atkT>0) a.atkT=Math.max(0, a.atkT-dt*4);
      }
      else if(dist<6){
        if(a.state==='enter'||a.state==='back'){ a.state='post'; }
        else if(a.state==='toDoor'){
          a.mapLoc='forest';
          const sp2=MAPS.hall.door.spawn; a.x=sp2[0]; a.y=sp2[1];
          a.tx=a.serveSpot[0]; a.ty=a.serveSpot[1]; a.state='toServe';
        }
        else if(a.state==='toServe'){ a.state='serving'; spawnHeart(a); }
        else if(a.state==='toDoorBack'){
          a.mapLoc='hall';
          const sp3=MAPS.forest.door.spawn; a.x=sp3[0]; a.y=sp3[1];
          a.tx=a.post[0]; a.ty=a.post[1]; a.state='back';
        }
        else if(a.state==='exit'){ a.el.remove(); agents.delete(a.key); return; }
      }else{
        const sp=125*depthNow;
        a.x+=dxp/dist*sp*dt/WORLD.w; a.y+=dyp/dist*sp*dt/WORLD.h;
        if(Math.abs(dxp)>12){const nl=dxp<0;if(nl!==a.faceLeft){a.faceLeft=nl;a.flipping=true;}}
      }
    }
    else if(a.cloak){
      if(a.state==='follow' && a.follow && agents.has(a.follow.key)){
        const f=a.follow;
        if(f.mapLoc!==a.mapLoc){ a.mapLoc=f.mapLoc; a.x=f.x+0.04; a.y=f.y+0.01; }
        a.tx=f.x+0.034*(f.faceLeft?1:-1); a.ty=f.y+0.012;
        const dxp=(a.tx-a.x)*WORLD.w, dyp=(a.ty-a.y)*WORLD.h, dist=Math.hypot(dxp,dyp);
        if(dist>4 && !f.sitting){
          const sp=135*depthNow;
          a.x+=dxp/dist*sp*dt/WORLD.w; a.y+=dyp/dist*sp*dt/WORLD.h;
          if(Math.abs(dxp)>12){const nl=dxp<0;if(nl!==a.faceLeft){a.faceLeft=nl;a.flipping=true;}}
          a.moving=true;
        }else a.moving=false;
        a.sitting=!!f.sitting;
      }else if(a.state==='leave'){
        const dxp=(a.tx-a.x)*WORLD.w, dyp=(a.ty-a.y)*WORLD.h, dist=Math.hypot(dxp,dyp);
        if(dist<6){ a.el.remove(); agents.delete(a.key); return; }
        const sp=140*depthNow;
        a.x+=dxp/dist*sp*dt/WORLD.w; a.y+=dyp/dist*sp*dt/WORLD.h;
        if(dxp>2 && a.faceLeft){a.faceLeft=false;a.flipping=true;}
        a.moving=true;
      }
    }
    else if(!keyMoved && a.state==='idle'){
      a.idleFor+=dt;
      a.timer-=dt;
      if(a.isMe && a.player && a.idleFor>8){ a.player=false; }
      if(a.timer<=0){
        const canWander = !a.isMe || !a.player;
        if(canWander && Math.random()<0.8){pickTarget(a);a.state='walk';a.goSit=false;}
        else a.timer=2+Math.random()*4;
      }
    }else if(!keyMoved && a.state==='walk'){
      const dxp=(a.tx-a.x)*WORLD.w, dyp=(a.ty-a.y)*WORLD.h;
      const dist=Math.hypot(dxp,dyp);
      const sp=(a.isMe?165:120)*depthNow;
      if(dist<6){
        a.state='idle';a.timer=2+Math.random()*6;a.idleFor=0;
        if(a.goSit){ a.sitting=true; a.goSit=false; spawnHeart(a); }
        if(a.isMe && a.goDoor){ a.goDoor=false; switchMap(MAPS[curMap].door.to); }
        if(a.isMe && a.bopTarget){ bopSlime(a.bopTarget); a.bopTarget=null; }
      }else{
        const c=clampFloor(a.x+dxp/dist*sp*dt/WORLD.w, a.y+dyp/dist*sp*dt/WORLD.h);
        a.x=c[0]; a.y=c[1];
        if(Math.abs(dxp)>12){const nl=dxp<0; if(nl!==a.faceLeft){a.faceLeft=nl;a.flipping=true;}}
      }
    }
    { const fl = a.slime ? MAPS.forest.floor : (a.isMe ? FLOOR : MAPS[a.mapLoc||'hall'].floor);
      const c=clampIn(fl,a.x,a.y); a.x=c[0]; a.y=c[1]; }
    const depth=0.9+(a.y-FLOOR.y0)/(FLOOR.y1-FLOOR.y0)*0.5;
    const size=Math.round(150*depth);
    let walking=(a.state==='walk'||a.state==='walkKey'||(a.staff&&(a.state==='enter'||a.state==='toDoor'||a.state==='toServe'||a.state==='toDoorBack'||a.state==='back'||a.state==='exit'||a.chase))||(a.cloak&&a.moving));
    if(a.slime) walking=(a.state==='walk');
    const tt=now/1000;
    let bob=0, hopRot=0, sqx=1, sqy=1;
    if(walking){
      // F.勇者輕彈跳(D 實測定案:快步蹦跳,幅度收斂版)
      const ph=(tt*5.5+a.seed)%1;
      const jump=Math.abs(Math.sin(ph*Math.PI));
      bob=-jump*5;
      const landing=jump<0.25;
      sqy=landing?0.958:1+jump*0.021;
      sqx=landing?1.035:1;
      hopRot=Math.sin(tt*11+a.seed)*1.05;
      setFrame(a,(Math.floor(tt*5.5+a.seed)%2)?'a':'b');   // 每跳換一次腳
    }else{
      // B.整體呼吸壓扁(D 實測定案:速度2.3、幅度2.2%)
      const ph=Math.sin(tt*(a.slime?4.5:2.3)*Math.PI+a.seed);
      sqy=1-Math.max(0,ph)*(a.slime?0.10:0.044);
      sqx=1+Math.max(0,ph)*(a.slime?0.08:0.031);
      setFrame(a,'idle');
    }
    if(a.slime && a.bopT>0){ sqy*=1-0.35*a.bopT; sqx*=1+0.30*a.bopT; }
    const vm = a.slime ? 'forest' : (a.isMe ? curMap : (a.mapLoc||'hall'));
    const vis = (vm===curMap);
    a.el.style.display = vis ? '' : 'none';
    if(!vis){ return; }
    a.el.style.left=(a.x*WORLD.w-size/2)+'px';
    a.el.style.top=(a.y*WORLD.h-size+bob)+'px';
    a.el.style.zIndex=Math.round(a.y*1000);
    a.cv.style.width=size+'px';a.cv.style.height=size+'px';
    // 紙片翻轉:flipT 在 [-1,1] 之間,過 0 的瞬間就是紙片側面(看起來被翻過去)
    if(a.flipping){
      const goal=a.faceLeft?-1:1;
      a.flipT += (goal-a.flipT)*Math.min(1,dt*14);
      if(Math.abs(goal-a.flipT)<0.02){a.flipT=goal;a.flipping=false;}
    }else{
      a.flipT=a.faceLeft?-1:1;
    }
    if(a.staff && a.atkT>0){ hopRot += (a.faceLeft?-1:1)*24*Math.sin(Math.min(1,a.atkT)*Math.PI); }
    let tf='rotate('+hopRot+'deg) scaleX('+(a.flipT*sqx)+') scaleY('+sqy+')';
    if(a.sitting) tf+=' scaleY(.86) translateY(6%)';
    a.cv.style.transform=tf;
    // 地面陰影:大小隨小人尺寸,坐下時縮小
    const shW=size*0.5*(a.sitting?0.8:(1+bob/22));
    a.sh.style.width=shW+'px';
    a.sh.style.height=(shW*0.28)+'px';
  });
  updateCamera(dt, now);
  updateCardpop();
  requestAnimationFrame(tick);
}
let camView={x:0,y:0};
let camFocus=null;
function updateCamera(dt, now){
  const a=camFocus||me();
  const vw=hall.clientWidth, vh=hall.clientHeight;
  let tx = a? a.x*WORLD.w : WORLD.w/2;
  let ty = a? a.y*WORLD.h - 40 : WORLD.h*0.6;
  const moving = a && (a.state==='walk');
  // 全景模式:整張地圖入鏡;看闆卡時才推近
  const fitZoom = Math.min(vw/WORLD.w, vh/WORLD.h);
  cam.tzoom = camFocus? 2.2 : fitZoom;
  if(!camFocus){ tx=WORLD.w/2; ty=WORLD.h/2; }
  cam.zoom += (cam.tzoom-cam.zoom)*Math.min(1,dt*4);
  cam.x += (tx-cam.x)*Math.min(1,dt*5);
  cam.y += (ty-cam.y)*Math.min(1,dt*5);
  // 換算成 world 左上角位移,並夾在世界邊界內(避免露出世界外的黑邊)
  const halfW=vw/cam.zoom/2, halfH=vh/cam.zoom/2;
  let vx=Math.min(WORLD.w-halfW, Math.max(halfW, cam.x));
  let vy=Math.min(WORLD.h-halfH, Math.max(halfH, cam.y));
  if(WORLD.w < halfW*2) vx=WORLD.w/2;
  if(WORLD.h < halfH*2) vy=WORLD.h/2;
  camView.x=vx-halfW; camView.y=vy-halfH;
  world.style.transform='scale('+cam.zoom+') translate('+(-camView.x)+'px,'+(-camView.y)+'px)';
}
requestAnimationFrame(tick);

function sync(){
  const keys=Object.keys(bosses);
  cnt.textContent=keys.length;
  emptyMsg.style.display=keys.length?'none':'block';
  agents.forEach((a,k)=>{ if(!a.staff && !a.cloak && !bosses[k]){a.el.remove();agents.delete(k);} });
  Object.entries(bosses).forEach(([k,b])=>{
    if(agents.has(k)){
      const a=agents.get(k); a.b=b;
      ['idle','a','b'].forEach(p=>drawDollTo(a.frames[p],b.doll,p));
      const cur=a.frame; a.frame=null; setFrame(a,cur||'idle');
      a.tag.textContent=b.name||'？';
    }else agents.set(k,makeAgent(k,b));
  });
}
const cardOverlay=document.getElementById('cardOverlay');
const cardBox=document.getElementById('cardBox');
async function openCard(a){
  if(!a) return;
  popTarget=a; cardOpen=true;
  await document.fonts.ready;
  drawFullCard(a.b);
  cardOverlay.classList.add('on');
  cardBox.classList.remove('show');void cardBox.offsetWidth;cardBox.classList.add('show');
}
function closeCard(){ popTarget=null; cardOpen=false; cardOverlay.classList.remove('on'); camFocus=null; }
function updateCardpop(){ /* overlay 置中,不需跟隨 */ }
function me(){ return [...agents.values()].find(a=>a.isMe); }
function claimMe(key){
  myKey=key; try{localStorage.setItem('tt_me',key);}catch(e){}
  const a=agents.get(key);
  if(a){ a.isMe=true; a.tag.textContent='★ '+(a.b.name||'？'); a.tag.style.background='var(--berry-dk)'; camFocus=null; }
}
function screenToWorld(sx,sy){
  const r=hall.getBoundingClientRect();
  return { x:(sx-r.left)/cam.zoom + camView.x, y:(sy-r.top)/cam.zoom + camView.y };
}
function moveMeTo(wx,wy){
  const a=me(); if(!a) return;
  const c=clampFloor(wx/WORLD.w, wy/WORLD.h);
  a.tx=c[0]; a.ty=c[1];
  a.state='walk'; a.sitting=false; a.idleFor=0; a.player=true;
}
hall.addEventListener('click',ev=>{
  if(cardOpen) return;                     // 闆卡開著時不移動
  const w=screenToWorld(ev.clientX,ev.clientY);
  moveMeTo(w.x, w.y);
});
cardOverlay.addEventListener('click',ev=>{ if(ev.target===cardOverlay) closeCard(); });
const keys={};
addEventListener('keydown',e=>{keys[e.key]=true;});
addEventListener('keyup',e=>{keys[e.key]=false;});

// 互動點
const spotEls=[];
function layoutSpots(){
  spotEls.forEach(e=>e.remove()); spotEls.length=0;
  SPOTS.forEach(sp=>{
    const el=document.createElement('div');el.className='spot';
    el.style.left=(sp.x*WORLD.w-28)+'px';el.style.top=(sp.y*WORLD.h-28)+'px';
    el.style.width='56px';el.style.height='56px';
    const fx=document.createElement('div');fx.className='fx';fx.textContent=sp.emo;
    el.appendChild(fx);
    el.onclick=(ev)=>{ev.stopPropagation();
      const a=me(); if(a){ moveMeTo(sp.x*WORLD.w, sp.y*WORLD.h); a.goSit=true; }
      fx.classList.remove('go');void fx.offsetWidth;fx.classList.add('go');
    };
    world.appendChild(el);spotEls.push(el);
  });
}


layoutSpots();
layoutDoor();
worldbg.style.backgroundImage="url('"+MAPS.hall.bg+"')";
/* ====== 店員 NPC 層 ====== */
const POSTS=[[0.32,0.565],[0.50,0.565],[0.68,0.565]];
const SERVE=[[0.50,0.74],[0.68,0.82],[0.84,0.68]];   // 森林陪玩點(史萊姆附近)
function makeStaff(cid, st, idx){
  const el=document.createElement('div');el.className='npc staff';
  const cv=document.createElement('canvas');cv.width=64;cv.height=64;
  const sh=document.createElement('div');sh.className='shadow';
  const tag=document.createElement('div');tag.className='tag';
  const led=document.createElement('div');led.className='led';
  el.appendChild(sh);el.appendChild(led);el.appendChild(cv);el.appendChild(tag);
  world.appendChild(el);
  const look=STAFF_LOOKS[hash(cid)%STAFF_LOOKS.length];
  const post=POSTS[idx%POSTS.length];
  const a={key:'staff_'+cid,cid,el,cv,tag,sh:sh,led,
    x:1.04,y:post[1],tx:post[0],ty:post[1],
    post, serveSpot:SERVE[idx%SERVE.length], mapLoc:'hall',
    state:'enter',timer:0,seed:hash(cid)%10,
    faceLeft:true,flipT:-1,flipping:false,sitting:false,
    staff:true,busy:false,cloakA:null,b:{name:st.name||'店員',doll:look}};
  a.frames={};
  ['idle','a','b'].forEach(p=>{
    const f=document.createElement('canvas');f.width=64;f.height=64;
    drawDollTo(f,look,p);a.frames[p]=f;
  });
  a.frame=null; setFrame(a,'idle');
  tag.textContent='🏮 '+(st.name||'店員');
  agents.set(a.key,a);
  return a;
}
function setStaffServe(a, busy){
  if(busy===a.busy) return;
  if(busy){
    a.busy=true; a.led.className='led r'; a.led.textContent='接單中'; a.sitting=false;
    const d=MAPS.hall.door;
    const c=clampIn(MAPS.hall.floor, d.x, d.y+0.04);
    a.state='toDoor'; a.tx=c[0]; a.ty=c[1];
    if(!a.cloakA) a.cloakA=makeCloak(a);
  }else{
    a.busy=false; a.led.className='led g'; a.led.textContent='待接單'; a.sitting=false;
    if(a.cloakA){ const c=a.cloakA; c.state='leave'; c.follow=null;
      const dd=MAPS[c.mapLoc||'hall'].door;
      const cc=clampIn(MAPS[c.mapLoc||'hall'].floor, dd.x, dd.y+0.05);
      c.tx=cc[0]; c.ty=cc[1]; a.cloakA=null; }
    if(a.mapLoc==='forest'){ const d=MAPS.forest.door;
      const c2=clampIn(MAPS.forest.floor, d.x, d.y+0.04);
      a.state='toDoorBack'; a.tx=c2[0]; a.ty=c2[1]; }
    else { a.state='back'; a.tx=a.post[0]; a.ty=a.post[1]; }
  }
}
function makeCloak(staffA){
  const el=document.createElement('div');el.className='npc';
  const cv=document.createElement('canvas');cv.width=64;cv.height=64;
  drawCloak(cv);
  const sh=document.createElement('div');sh.className='shadow';
  const tag=document.createElement('div');tag.className='tag';tag.textContent='神秘旅人';
  el.appendChild(sh);el.appendChild(cv);el.appendChild(tag);
  world.appendChild(el);
  const a={key:'cloak_'+staffA.cid+'_'+(Date.now()%1000000),el,cv,tag,sh:sh,mapLoc:staffA.mapLoc||'hall',
    x:Math.min(1.0,staffA.x+0.035),y:staffA.y,tx:0,ty:staffA.y,state:'follow',follow:staffA,
    seed:(staffA.seed+5)%10,faceLeft:true,flipT:-1,flipping:false,sitting:false,cloak:true,
    frames:null,frame:'idle'};
  agents.set(a.key,a);
  return a;
}
if(db) db.ref(ROOT+'/staffStatus').on('value',snap=>{
  const all=snap.val()||{};
  let idx=0;
  Object.entries(all).forEach(([cid,st])=>{
    const key='staff_'+cid;
    let a=agents.get(key);
    if(st.on){
      if(!a){ a=makeStaff(cid,st,idx); a.led.className='led g'; a.led.textContent='待接單'; }
      a.b.name=st.name||'店員'; a.tag.textContent='🏮 '+a.b.name;
      if(st.busy!==undefined) setStaffServe(a, !!st.busy);
    }else if(a){
      a.led.className='led'; a.state='exit'; a.sitting=false; a.busy=false;
      { const dd=MAPS[a.mapLoc||'hall'].door;
        const c3=clampIn(MAPS[a.mapLoc||'hall'].floor, dd.x, dd.y+0.04);
        a.tx=c3[0]; a.ty=c3[1]; }
      if(a.cloakA){ const c=a.cloakA; c.state='leave'; c.follow=null;
        const dd=MAPS[c.mapLoc||'hall'].door;
        const cc=clampIn(MAPS[c.mapLoc||'hall'].floor, dd.x, dd.y+0.05);
        c.tx=cc[0]; c.ty=cc[1]; a.cloakA=null; }
    }
    idx++;
  });
});

if(TEST_MODE){
  const demos=['demo1','demo2','demo3'];
  setTimeout(()=>{
    demos.forEach((cid,i)=>{
      if(!agents.has('staff_'+cid)){
        const a=makeStaff(cid,{name:'測試店員'+(i+1)},i);
        a.led.className='led g'; a.led.textContent='待接單';
      }
    });
  }, 800);
  let di=0;
  setInterval(()=>{
    const a=agents.get('staff_'+demos[di%3]); di++;
    if(!a||a.busy) return;
    setStaffServe(a, true);
    setTimeout(()=>{ if(agents.has(a.key)) setStaffServe(a, false); }, 45000);
  }, 20000);
}
if(db){
  db.ref(ROOT+'/lobby').limitToLast(120).on('value',s=>{bosses=s.val()||{};sync();});
}else{
  cnt.textContent='0';emptyMsg.style.display='block';
}
