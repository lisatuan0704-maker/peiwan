<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掌櫃台帳｜虛擬角色陪玩</title>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root{
  --night:#241B33; --night2:#2E2344;
  --paper:#F4E9D4; --paper2:#EDDFC2;
  --candle:#F2A65A; --candle-deep:#D9853B;
  --lav:#A78BDB; --ink:#3B2F2F; --ink-soft:#7A6A5F;
  --ok:#7FBF8E; --ok-deep:#5E9C6E; --warn:#E08A8A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--night);color:var(--paper);font-family:'Kiwi Maru','Noto Sans TC',sans-serif;min-height:100vh;
  background-image:radial-gradient(circle at 20% 10%, rgba(167,139,219,.14), transparent 40%),radial-gradient(circle at 85% 30%, rgba(242,166,90,.10), transparent 45%)}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px 60px}
header{text-align:center;padding:14px 0 4px}
header h1{font-size:20px;letter-spacing:4px}
header p{font-size:12px;color:var(--lav);letter-spacing:2px;margin-top:4px}
.card{background:var(--paper);color:var(--ink);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 4px 0 rgba(0,0,0,.25)}
.card h2{font-size:14px;color:var(--candle-deep);letter-spacing:2px;margin-bottom:10px}
input,select{padding:9px 10px;border:2px solid var(--paper2);border-radius:10px;font-family:inherit;font-size:13px;background:#FBF4E4;color:var(--ink)}
input:focus,select:focus{outline:none;border-color:var(--lav)}
.btn{padding:12px 20px;border:none;border-radius:14px;background:var(--candle);color:var(--ink);font-family:inherit;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;box-shadow:0 3px 0 var(--candle-deep)}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--candle-deep)}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:10px}
.btn.lav{background:var(--lav);color:#fff;box-shadow:0 3px 0 #8A6ACB}
.btn.ok{background:var(--ok);color:#fff;box-shadow:0 3px 0 var(--ok-deep)}
.btn.ghost{background:#EFE5D0;color:var(--ink-soft);box-shadow:none}
.tabs{display:flex;gap:8px;margin:4px 0 14px;flex-wrap:wrap}
.tabs button{flex:1;min-width:100px;padding:10px 6px;border-radius:14px;font-family:inherit;font-size:13px;cursor:pointer;background:var(--night2);color:var(--lav);border:1px solid rgba(167,139,219,.35)}
.tabs button.on{background:var(--candle);color:var(--ink);font-weight:700;border-color:var(--candle)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--candle-deep);font-size:12px;letter-spacing:1px;padding:8px 6px;border-bottom:2px solid var(--paper2)}
td{padding:9px 6px;border-bottom:1px solid var(--paper2);vertical-align:middle}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;border:2px dashed;font-weight:700;white-space:nowrap}
.s-pending{color:#B08A2E;border-color:#B08A2E;background:#FFF6DC}
.s-accepted{color:#5B8DBE;border-color:#5B8DBE;background:#E7F1FB}
.s-declined{color:#B06A6A;border-color:#B06A6A;background:#FBEAEA}
.s-done{color:#6A9E78;border-color:#6A9E78;background:#EAF7EE}
.s-verified{color:#8A6ACB;border-color:#8A6ACB;background:#F0EAFB}
.s-settled{color:#B08A2E;border-color:#B08A2E;background:#FFF6DC}
.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:24px 0}
.stat{display:flex;gap:10px;text-align:center;margin-bottom:14px;flex-wrap:wrap}
.stat div{flex:1;min-width:120px;background:#FFF3DF;border:2px dashed var(--candle);border-radius:14px;padding:10px 4px}
.stat b{display:block;font-size:20px;color:var(--candle-deep)}
.stat span{font-size:11px;color:var(--ink-soft)}
.l5{font-size:16px;font-weight:700;letter-spacing:2px;color:#8A6ACB}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:10px}
.mono{font-family:monospace}
.hint{font-size:11px;color:var(--ink-soft);margin-top:8px;line-height:1.7}
#pgMain{display:none}
.loginBox{max-width:420px;margin:0 auto}
.loginBox input{width:100%;text-align:center;letter-spacing:6px;font-size:16px;padding:12px}
.loginBox .btn{width:100%;margin-top:12px}
@media(max-width:640px){ th,td{padding:7px 4px;font-size:12px} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🗝️ 掌櫃台帳</h1>
    <p>MANAGER · 對帳、價目、角色、月結</p>
  </header>

  <!-- 登入 / 首次設定 -->
  <div id="pgLogin" class="loginBox">
    <div class="card">
      <h2 id="loginTitle">輸入後台 PIN 碼</h2>
      <input id="adminPin" maxlength="8" placeholder="••••••">
      <button class="btn" onclick="adminLogin()">開啟台帳 ✦</button>
      <p class="hint" id="loginHint"></p>
    </div>
  </div>

  <!-- 主頁 -->
  <div id="pgMain">
    <div class="tabs">
      <button id="tb0" class="on" onclick="showTab(0)">💰 對帳<span id="cntCheck"></span></button>
      <button id="tb1" onclick="showTab(1)">📜 委託總覽</button>
      <button id="tb2" onclick="showTab(2)">🏷️ 價目表</button>
      <button id="tb3" onclick="showTab(3)">🎭 角色</button>
      <button id="tb4" onclick="showTab(4)">📊 月結</button>
    </div>
    <div id="tab0"></div>
    <div id="tab1" style="display:none"></div>
    <div id="tab2" style="display:none"></div>
    <div id="tab3" style="display:none"></div>
    <div id="tab4" style="display:none"></div>
  </div>
</div>

<script>
/* ====== 貼上你的 Firebase 設定（三個頁面用同一份）====== */
const firebaseConfig = {
  apiKey: "AIzaSyCXUrJCDqAuB7LmrZhp8SCYM6tVLXWDevc",
  authDomain: "my-shop-0520.firebaseapp.com",
  databaseURL: "https://my-shop-0520-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "my-shop-0520",
  storageBucket: "my-shop-0520.firebasestorage.app",
  messagingSenderId: "430482271005",
  appId: "1:430482271005:web:967059c91a9b7970bdcff4",
  measurementId: "G-NN7HQ5W8T1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ROOT = "peiwan";
const STATUS = {pending:"待接單",accepted:"已接單",declined:"已婉拒",done:"已完成",verified:"已對帳",settled:"已結算"};

let orders={}, chars={}, svcs={}, savedPin=null, curTab=0;
let fMonth="", fStatus="", fChar="";

/* ---------- 登入（PIN 存在資料庫，首次使用自動進入設定模式） ---------- */
db.ref(ROOT+"/config/adminPin").once("value", s=>{
  savedPin = s.val();
  if(!savedPin){
    loginTitle.textContent = "首次使用：設定後台 PIN 碼";
    loginHint.textContent = "這組 PIN 之後給你和經理登入用，設定後記好。";
  }
});
function adminLogin(){
  const p = adminPin.value.trim();
  if(!p) return alert("輸入 PIN");
  if(!savedPin){
    if(p.length<4) return alert("PIN 至少 4 碼");
    db.ref(ROOT+"/config/adminPin").set(p).then(()=>{ savedPin=p; enter(); });
  } else if(p===String(savedPin)){ enter(); }
  else alert("PIN 不對");
}
function enter(){
  pgLogin.style.display="none"; pgMain.style.display="block";
  const now=new Date();
  fMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  db.ref(ROOT+"/orders").on("value",s=>{orders=s.val()||{};render();});
  db.ref(ROOT+"/characters").on("value",s=>{chars=s.val()||{};render();});
  db.ref(ROOT+"/config/services").on("value",s=>{svcs=s.val()||{};render();});
}
function showTab(i){
  curTab=i;
  for(let k=0;k<5;k++){
    document.getElementById("tab"+k).style.display = k===i?"block":"none";
    document.getElementById("tb"+k).classList.toggle("on",k===i);
  }
}
function fmt(t){return t? new Date(t).toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"—";}
function esc(x){return String(x==null?"":x).replace(/</g,"&lt;");}
function months(){
  const set=new Set(Object.values(orders).map(o=>o.month).filter(Boolean));
  const now=new Date(); set.add(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  return [...set].sort().reverse();
}

function render(){ renderCheck(); renderAll(); renderSvcs(); renderChars(); renderSettle(); }

/* ---------- 對帳 ---------- */
function renderCheck(){
  const list=Object.entries(orders).filter(([,o])=>o.status==="done").sort((a,b)=>a[1].doneAt-b[1].doneAt);
  cntCheck.textContent = list.length? ` ${list.length}`:"";
  const waitPay=Object.values(orders).filter(o=>o.status==="pending").length;
  const running=Object.values(orders).filter(o=>o.status==="accepted").length;
  tab0.innerHTML = `<div class="card">
    <div class="stat">
      <div><b>${waitPay}</b><span>待接單</span></div>
      <div><b>${running}</b><span>進行中</span></div>
      <div><b>${list.length}</b><span>待對帳</span></div>
    </div>
    <h2>待對帳委託 — 核對「後五碼＋金額」與銀行入帳</h2>
    ${list.length? `<table><tr><th>編號</th><th>角色</th><th>內容</th><th>金額</th><th>後五碼</th><th>老板</th><th>完成時間</th><th></th></tr>
      ${list.map(([id,o])=>`<tr>
        <td class="mono">${o.no}</td><td>${esc(o.charName)}</td>
        <td>${esc(o.serviceName)}${o.mode==='package'?'':' ×'+o.qty}</td>
        <td><b>NT$${o.amount.toLocaleString()}</b></td>
        <td class="l5">${esc(o.last5)}</td>
        <td>${esc(o.boss&&o.boss.name)}<br><span style="color:var(--ink-soft);font-size:11px">${esc(o.boss&&o.boss.contact)}</span></td>
        <td>${fmt(o.doneAt)}</td>
        <td><button class="btn sm ok" onclick="verify('${id}')">核銷 ✔</button>
            <button class="btn sm ghost" onclick="rollback('${id}')">退回</button></td>
      </tr>`).join("")}</table>`
    : `<div class="empty">沒有待對帳的委託，帳目乾乾淨淨 ✨</div>`}
    <p class="hint">核銷 = 你已在銀行明細找到「後五碼相符、金額相符」的入帳。找不到就先退回並聯絡老板。</p>
  </div>`;
}
function verify(id){ db.ref(ROOT+"/orders/"+id).update({status:"verified",verifiedAt:firebase.database.ServerValue.TIMESTAMP}); }
function rollback(id){ if(confirm("退回為「已接單」？（例如查無入帳，需再確認）")) db.ref(ROOT+"/orders/"+id).update({status:"accepted"}); }

/* ---------- 委託總覽 ---------- */
function renderAll(){
  const ms=months();
  let list=Object.entries(orders).sort((a,b)=>b[1].createdAt-a[1].createdAt);
  if(fMonth) list=list.filter(([,o])=>o.month===fMonth);
  if(fStatus) list=list.filter(([,o])=>o.status===fStatus);
  if(fChar) list=list.filter(([,o])=>o.cid===fChar);
  tab1.innerHTML = `<div class="card">
    <div class="filters">
      <select onchange="fMonth=this.value;renderAll()">${ms.map(m=>`<option ${m===fMonth?'selected':''}>${m}</option>`).join("")}<option value="" ${fMonth===""?'selected':''}>全部月份</option></select>
      <select onchange="fStatus=this.value;renderAll()"><option value="">全部狀態</option>${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${k===fStatus?'selected':''}>${v}</option>`).join("")}</select>
      <select onchange="fChar=this.value;renderAll()"><option value="">全部角色</option>${Object.entries(chars).map(([id,c])=>`<option value="${id}" ${id===fChar?'selected':''}>${esc(c.name)}</option>`).join("")}</select>
    </div>
    ${list.length? `<table><tr><th>編號</th><th>角色</th><th>內容</th><th>金額</th><th>老板</th><th>張貼時間</th><th>狀態</th></tr>
      ${list.map(([id,o])=>`<tr>
        <td class="mono">${o.no}</td><td>${esc(o.charName)}</td>
        <td>${esc(o.serviceName)}${o.mode==='package'?'':' ×'+o.qty}${o.note?`<br><span style="font-size:11px;color:var(--ink-soft)">💬 ${esc(o.note)}</span>`:""}</td>
        <td>NT$${o.amount.toLocaleString()}</td>
        <td>${esc(o.boss&&o.boss.name)}</td>
        <td>${fmt(o.createdAt)}</td>
        <td><select onchange="db.ref(ROOT+'/orders/${id}/status').set(this.value)">${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${k===o.status?'selected':''}>${v}</option>`).join("")}</select></td>
      </tr>`).join("")}</table>`
    : `<div class="empty">這個條件下沒有委託</div>`}
  </div>`;
}

/* ---------- 價目表 ---------- */
function renderSvcs(){
  const list=Object.entries(svcs).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  tab2.innerHTML = `<div class="card">
    <h2>價目表（老板下單頁即時同步）</h2>
    ${list.length? `<table><tr><th>名稱</th><th>計費</th><th>單價</th><th>單位</th><th>上架</th><th></th></tr>
      ${list.map(([id,v])=>`<tr>
        <td>${esc(v.name)}</td>
        <td>${{hour:"按小時",round:"按局",package:"套餐"}[v.mode]||v.mode}</td>
        <td>NT$${v.price}</td><td>${esc(v.unitLabel||"—")}</td>
        <td><button class="btn sm ${v.active?'ok':'ghost'}" onclick="db.ref(ROOT+'/config/services/${id}/active').set(${!v.active})">${v.active?'上架中':'已下架'}</button></td>
        <td><button class="btn sm ghost" onclick="if(confirm('刪除「${esc(v.name)}」？'))db.ref(ROOT+'/config/services/${id}').remove()">刪</button></td>
      </tr>`).join("")}</table>` : `<div class="empty">還沒有價目，先新增或一鍵建立範例</div>`}
    <h2 style="margin-top:16px">新增項目</h2>
    <div class="grid">
      <input id="svName" placeholder="名稱，例：技術陪玩">
      <select id="svMode"><option value="hour">按小時</option><option value="round">按局</option><option value="package">套餐</option></select>
      <input id="svPrice" type="number" placeholder="單價 NT$">
      <input id="svUnit" placeholder="單位字，例：小時／局">
    </div>
    <button class="btn sm" onclick="addSvc()">新增 ＋</button>
    ${list.length? "" : `<button class="btn sm lav" style="margin-left:8px" onclick="seedSvcs()">一鍵建立範例價目表</button>`}
  </div>`;
}
function addSvc(){
  const name=svName.value.trim(), price=Number(svPrice.value);
  if(!name||!price) return alert("名稱和單價都要填");
  db.ref(ROOT+"/config/services").push({name,mode:svMode.value,price,unitLabel:svUnit.value.trim(),active:true,order:Date.now()});
}
function seedSvcs(){
  [["技術陪玩","hour",300,"小時"],["娛樂陪玩","hour",250,"小時"],["排位上分","round",150,"局"],["暢玩套餐 3hr","package",800,""]]
  .forEach(([name,mode,price,unitLabel],i)=>db.ref(ROOT+"/config/services").push({name,mode,price,unitLabel,active:true,order:i}));
}

/* ---------- 角色 ---------- */
function renderChars(){
  const list=Object.entries(chars);
  tab3.innerHTML = `<div class="card">
    <h2>角色名冊（真人身分只存在這裡，前台永遠只見角色）</h2>
    ${list.length? `<table><tr><th>角色</th><th>介紹</th><th>PIN</th><th>分潤%</th><th>接單</th><th>啟用</th><th></th></tr>
      ${list.map(([id,c])=>`<tr>
        <td>${c.emoji||"✨"} <b>${esc(c.name)}</b></td>
        <td style="font-size:12px;color:var(--ink-soft)">${esc(c.tagline||"")}</td>
        <td class="mono">${esc(c.pin)}</td>
        <td><input type="number" value="${c.share!=null?c.share:70}" style="width:60px" onchange="db.ref(ROOT+'/characters/${id}/share').set(Number(this.value))"></td>
        <td>${c.available?'🟢':'⚪'}</td>
        <td><button class="btn sm ${c.active?'ok':'ghost'}" onclick="db.ref(ROOT+'/characters/${id}/active').set(${!c.active})">${c.active?'啟用中':'停用'}</button></td>
        <td><button class="btn sm ghost" onclick="if(confirm('刪除角色「${esc(c.name)}」？委託紀錄會保留'))db.ref(ROOT+'/characters/${id}').remove()">刪</button></td>
      </tr>`).join("")}</table>` : `<div class="empty">還沒有角色，新增第一位吧</div>`}
    <h2 style="margin-top:16px">新增角色</h2>
    <div class="grid">
      <input id="chEmoji" placeholder="emoji，例：🐰" maxlength="4">
      <input id="chName" placeholder="角色名">
      <input id="chTag" placeholder="一句話介紹">
      <input id="chPin" placeholder="登入 PIN（4-6 碼）" maxlength="6">
      <input id="chShare" type="number" placeholder="分潤%（預設 70）">
    </div>
    <button class="btn sm" onclick="addChar()">新增 ＋</button>
    <p class="hint">PIN 是給該角色的陪玩登入「角色手札」用的，一人一組不要重複。</p>
  </div>`;
}
function addChar(){
  const name=chName.value.trim(), pin=chPin.value.trim();
  if(!name||!pin) return alert("角色名和 PIN 都要填");
  if(Object.values(chars).some(c=>String(c.pin)===pin)) return alert("這組 PIN 已有人用，換一組");
  db.ref(ROOT+"/characters").push({
    name, pin, emoji:chEmoji.value.trim()||"✨", tagline:chTag.value.trim(),
    share:Number(chShare.value)||70, active:true, available:false
  });
}

/* ---------- 月結 ---------- */
let sMonth="";
function renderSettle(){
  const ms=months();
  if(!sMonth) sMonth=ms[0]||"";
  const rows={};
  Object.entries(orders).forEach(([id,o])=>{
    if(o.month!==sMonth) return;
    if(!["verified","settled"].includes(o.status)) return;
    (rows[o.cid]=rows[o.cid]||{name:o.charName,n:0,total:0,ids:[]});
    rows[o.cid].n++; rows[o.cid].total+=o.amount; rows[o.cid].ids.push(id);
  });
  const entries=Object.entries(rows);
  let grand=0, grandPay=0;
  const body=entries.map(([cidK,r])=>{
    const share=chars[cidK]&&chars[cidK].share!=null?chars[cidK].share:70;
    const pay=Math.round(r.total*share/100);
    grand+=r.total; grandPay+=pay;
    return `<tr><td><b>${esc(r.name)}</b></td><td>${r.n}</td><td>NT$${r.total.toLocaleString()}</td>
      <td>${share}%</td><td><b>NT$${pay.toLocaleString()}</b></td>
      <td><button class="btn sm lav" onclick="settle('${cidK}')">標記已結算</button></td></tr>`;
  }).join("");
  tab4.innerHTML = `<div class="card">
    <div class="filters"><select onchange="sMonth=this.value;renderSettle()">${ms.map(m=>`<option ${m===sMonth?'selected':''}>${m}</option>`).join("")}</select>
    <button class="btn sm" onclick="exportCsv()">匯出 CSV 📥</button></div>
    <div class="stat">
      <div><b>${grand.toLocaleString()}</b><span>已對帳總額</span></div>
      <div><b>${grandPay.toLocaleString()}</b><span>應付分潤</span></div>
      <div><b>${(grand-grandPay).toLocaleString()}</b><span>公司留存</span></div>
    </div>
    ${entries.length? `<table><tr><th>角色</th><th>單數</th><th>總額</th><th>分潤</th><th>應付</th><th></th></tr>${body}</table>`
      : `<div class="empty">${sMonth} 還沒有已對帳的委託</div>`}
    <p class="hint">只計入「已對帳／已結算」的委託——沒核對到錢的單子永遠不會進月結，這就是帳目乾淨的保證。「標記已結算」會把該角色本月已對帳單全部轉為已結算。</p>
  </div>`;
}
function settle(cidK){
  if(!confirm("將該角色本月所有「已對帳」委託標記為「已結算」？（代表分潤已匯出）")) return;
  Object.entries(orders).forEach(([id,o])=>{
    if(o.cid===cidK&&o.month===sMonth&&o.status==="verified")
      db.ref(ROOT+"/orders/"+id).update({status:"settled",settledAt:firebase.database.ServerValue.TIMESTAMP});
  });
}
function exportCsv(){
  const list=Object.values(orders).filter(o=>o.month===sMonth).sort((a,b)=>a.createdAt-b.createdAt);
  if(!list.length) return alert("這個月沒有委託");
  const head="編號,日期,角色,內容,模式,數量,金額,老板,聯絡ID,後五碼,狀態\n";
  const body=list.map(o=>[o.no,new Date(o.createdAt).toLocaleString("zh-TW"),o.charName,o.serviceName,
    {hour:"小時",round:"局",package:"套餐"}[o.mode]||o.mode,o.qty,o.amount,
    o.boss&&o.boss.name,o.boss&&o.boss.contact,'="'+o.last5+'"',STATUS[o.status]||o.status]
    .map(x=>`"${String(x==null?"":x).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+head+body],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`委託帳目_${sMonth}.csv`; a.click();
}
</script>
