<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掌櫃台帳｜虛擬角色陪玩</title>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root{
  --night:#241B33; --night2:#2E2344;
  --paper:#F4E9D4; --paper2:#EDDFC2;
  --candle:#F2A65A; --candle-deep:#D9853B;
  --lav:#A78BDB; --ink:#3B2F2F; --ink-soft:#7A6A5F;
  --ok:#7FBF8E; --ok-deep:#5E9C6E; --warn:#E08A8A; --warn-deep:#C56A6A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--night);color:var(--paper);font-family:'Kiwi Maru','Noto Sans TC',sans-serif;min-height:100vh;
  background-image:radial-gradient(circle at 20% 10%, rgba(167,139,219,.14), transparent 40%),radial-gradient(circle at 85% 30%, rgba(242,166,90,.10), transparent 45%)}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px}
header{text-align:center;padding:14px 0 4px}
header h1{font-size:20px;letter-spacing:4px}
header p{font-size:12px;color:var(--lav);letter-spacing:2px;margin-top:4px}
.card{background:var(--paper);color:var(--ink);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 4px 0 rgba(0,0,0,.25)}
.card h2{font-size:14px;color:var(--candle-deep);letter-spacing:2px;margin-bottom:10px}
input,select{padding:9px 10px;border:2px solid var(--paper2);border-radius:10px;font-family:inherit;font-size:13px;background:#FBF4E4;color:var(--ink)}
input:focus,select:focus{outline:none;border-color:var(--lav)}
.btn{padding:12px 20px;border:none;border-radius:14px;background:var(--candle);color:var(--ink);font-family:inherit;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;box-shadow:0 3px 0 var(--candle-deep)}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--candle-deep)}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:10px}
.btn.lav{background:var(--lav);color:#fff;box-shadow:0 3px 0 #8A6ACB}
.btn.ok{background:var(--ok);color:#fff;box-shadow:0 3px 0 var(--ok-deep)}
.btn.ghost{background:#EFE5D0;color:var(--ink-soft);box-shadow:none}
.tabs{display:flex;gap:8px;margin:4px 0 14px;flex-wrap:wrap}
.tabs button{flex:1;min-width:90px;padding:10px 6px;border-radius:14px;font-family:inherit;font-size:13px;cursor:pointer;background:var(--night2);color:var(--lav);border:1px solid rgba(167,139,219,.35)}
.tabs button.on{background:var(--candle);color:var(--ink);font-weight:700;border-color:var(--candle)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--candle-deep);font-size:12px;letter-spacing:1px;padding:8px 6px;border-bottom:2px solid var(--paper2)}
td{padding:9px 6px;border-bottom:1px solid var(--paper2);vertical-align:middle}
.pay{font-size:11px;padding:2px 9px;border-radius:20px;border:2px dashed;font-weight:700;white-space:nowrap}
.pay.no{color:var(--warn-deep);border-color:var(--warn-deep);background:#FCEAEA}
.pay.yes{color:var(--ok-deep);border-color:var(--ok-deep);background:#EAF7EE}
.prog{font-size:11px;padding:2px 9px;border-radius:20px;background:#EDE3F5;color:#6A55A0;font-weight:700;white-space:nowrap}
.prog.disputed{background:#FCEAEA;color:var(--warn-deep)}
.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:24px 0}
.stat{display:flex;gap:10px;text-align:center;margin-bottom:14px;flex-wrap:wrap}
.stat div{flex:1;min-width:110px;background:#FFF3DF;border:2px dashed var(--candle);border-radius:14px;padding:10px 4px}
.stat b{display:block;font-size:20px;color:var(--candle-deep)}
.stat span{font-size:11px;color:var(--ink-soft)}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:10px}
.mono{font-family:monospace}
.hint{font-size:11px;color:var(--ink-soft);margin-top:8px;line-height:1.7}
#pgMain{display:none}
.loginBox{max-width:420px;margin:0 auto}
.loginBox input{width:100%;text-align:center;letter-spacing:6px;font-size:16px;padding:12px}
.loginBox .btn{width:100%;margin-top:12px}
@media(max-width:640px){ th,td{padding:7px 4px;font-size:12px} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🗝️ 掌櫃台帳</h1>
    <p>OWNER · 全店總覽 · 月結分潤</p>
  </header>

  <div id="pgLogin" class="loginBox">
    <div class="card">
      <h2 id="loginTitle">輸入老闆 PIN 碼</h2>
      <input id="adminPin" maxlength="8" placeholder="••••••">
      <button class="btn" onclick="adminLogin()">開啟台帳 ✦</button>
      <p class="hint" id="loginHint"></p>
    </div>
  </div>

  <div id="pgMain">
    <div class="tabs">
      <button id="tb0" class="on" onclick="showTab(0)">📄 委託總覽</button>
      <button id="tb1" onclick="showTab(1)">📊 月結</button>
      <button id="tb2" onclick="showTab(2)">🏷️ 價目表</button>
      <button id="tb3" onclick="showTab(3)">🎭 角色</button>
      <button id="tb4" onclick="showTab(4)">👤 客服</button>
    </div>
    <div id="tab0"></div>
    <div id="tab1" style="display:none"></div>
    <div id="tab2" style="display:none"></div>
    <div id="tab3" style="display:none"></div>
    <div id="tab4" style="display:none"></div>
  </div>
</div>

<script>
/* ====== 貼上你的 Firebase 設定（三個頁面用同一份）====== */
const firebaseConfig = {
  apiKey: "AIzaSyCXUrJCDqAuB7LmrZhp8SCYM6tVLXWDevc",
  authDomain: "my-shop-0520.firebaseapp.com",
  databaseURL: "https://my-shop-0520-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "my-shop-0520",
  storageBucket: "my-shop-0520.firebasestorage.app",
  messagingSenderId: "430482271005",
  appId: "1:430482271005:web:967059c91a9b7970bdcff4",
  measurementId: "G-NN7HQ5W8T1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ROOT = "peiwan";
const PROG = {pending:"待核對",confirmed:"待開始",serving:"服務中",done:"已完成",settled:"已結算",disputed:"回報中"};
const COMPANY_CUT = 20; // 公司抽成 %，陪玩拿 80

let orders={}, chars={}, svcs={}, staff={}, savedPin=null;
let fMonth="", fProg="", fChar="", fKefu="", fPaid="";

db.ref(ROOT+"/config/adminPin").once("value",s=>{
  savedPin=s.val();
  if(!savedPin){ loginTitle.textContent="首次使用：設定老闆 PIN 碼"; loginHint.textContent="這組給你登入後台用，設定後記好。"; }
});
function adminLogin(){
  const p=adminPin.value.trim();
  if(!p) return alert("輸入 PIN");
  if(!savedPin){ if(p.length<4) return alert("PIN 至少 4 碼");
    db.ref(ROOT+"/config/adminPin").set(p).then(()=>{savedPin=p;enter();}); }
  else if(p===String(savedPin)) enter();
  else alert("PIN 不對");
}
function enter(){
  pgLogin.style.display="none"; pgMain.style.display="block";
  const now=new Date(); fMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  db.ref(ROOT+"/orders").on("value",s=>{orders=s.val()||{};render();});
  db.ref(ROOT+"/characters").on("value",s=>{chars=s.val()||{};render();});
  db.ref(ROOT+"/config/services").on("value",s=>{svcs=s.val()||{};render();});
  db.ref(ROOT+"/staff").on("value",s=>{staff=s.val()||{};render();});
}
function showTab(i){
  for(let k=0;k<5;k++){document.getElementById("tab"+k).style.display=k===i?"block":"none";
    document.getElementById("tb"+k).classList.toggle("on",k===i);}
}
function fmt(t){return t? new Date(t).toLocaleString("zh-TW",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"—";}
function hmsShort(sec){const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60);return h?`${h}時${m}分`:`${m}分`;}
function esc(x){return String(x==null?"":x).replace(/</g,"&lt;");}
function months(){
  const set=new Set(Object.values(orders).map(o=>o.month).filter(Boolean));
  const now=new Date(); set.add(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`);
  return [...set].sort().reverse();
}
function render(){ renderAll(); renderSettle(); renderSvcs(); renderChars(); renderStaff(); }

/* ---------- 委託總覽 ---------- */
function renderAll(){
  const ms=months();
  let list=Object.entries(orders).sort((a,b)=>b[1].createdAt-a[1].createdAt);
  if(fMonth) list=list.filter(([,o])=>o.month===fMonth);
  if(fProg) list=list.filter(([,o])=>o.status===fProg);
  if(fChar) list=list.filter(([,o])=>o.cid===fChar);
  if(fKefu) list=list.filter(([,o])=>o.kefuId===fKefu);
  if(fPaid==="paid") list=list.filter(([,o])=>o.paid);
  if(fPaid==="unpaid") list=list.filter(([,o])=>!o.paid);

  const sum=list.reduce((a,[,o])=>a+o.amount,0);
  const unpaid=list.filter(([,o])=>!o.paid).length;
  const disputed=Object.values(orders).filter(o=>o.status==="disputed").length;
  const serving=Object.values(orders).filter(o=>o.status==="serving").length;

  const servingList=Object.values(orders).filter(o=>o.status==="serving");
  const liveBar = servingList.length? `<div style="margin-bottom:12px;padding:10px 12px;border:2px solid var(--ok-deep);border-radius:12px;background:#EAF7EF">
    <b style="color:var(--ok-deep);font-size:13px">🟢 現在有 ${servingList.length} 位陪玩在陣：</b>
    <div style="font-size:12px;color:var(--ink-soft);margin-top:4px">${servingList.map(o=>`${chars[o.cid]?(chars[o.cid].emoji||''):''}${esc(o.charName)}（${esc(o.customer)}・${o.running?'計時中':'暫停中'}）`).join("、")}</div></div>` : "";

  tab0.innerHTML=`<div class="card">
    ${liveBar}
    <div class="stat">
      <div><b>${list.length}</b><span>單數（篩選後）</span></div>
      <div><b>${sum.toLocaleString()}</b><span>金額</span></div>
      <div><b>${serving}</b><span>服務中</span></div>
      <div><b>${unpaid}</b><span>未收款</span></div>
      <div><b>${disputed}</b><span>陪玩回報中</span></div>
    </div>
    <div class="filters">
      <select onchange="fMonth=this.value;renderAll()">${ms.map(m=>`<option ${m===fMonth?'selected':''}>${m}</option>`).join("")}<option value="" ${fMonth===""?'selected':''}>全部月份</option></select>
      <select onchange="fKefu=this.value;renderAll()"><option value="">全部客服</option>${Object.entries(staff).map(([id,k])=>`<option value="${id}" ${id===fKefu?'selected':''}>${esc(k.name)}</option>`).join("")}</select>
      <select onchange="fChar=this.value;renderAll()"><option value="">全部陪玩</option>${Object.entries(chars).map(([id,c])=>`<option value="${id}" ${id===fChar?'selected':''}>${esc(c.name)}</option>`).join("")}</select>
      <select onchange="fPaid=this.value;renderAll()"><option value="">全部付款</option><option value="unpaid" ${fPaid==='unpaid'?'selected':''}>未付款</option><option value="paid" ${fPaid==='paid'?'selected':''}>已付款</option></select>
      <select onchange="fProg=this.value;renderAll()"><option value="">全部進度</option>${Object.entries(PROG).map(([k,v])=>`<option value="${k}" ${k===fProg?'selected':''}>${v}</option>`).join("")}</select>
    </div>
    ${list.length? `<table><tr><th>編號</th><th>陪玩</th><th>內容</th><th>金額</th><th>實際時長</th><th>客人</th><th>客服</th><th>付款</th><th>進度</th><th></th></tr>
      ${list.map(([id,o])=>`<tr>
        <td class="mono">${o.no}</td>
        <td>${chars[o.cid]?(chars[o.cid].emoji||''):''} ${esc(o.charName)}</td>
        <td>${esc(o.serviceName)}${o.mode==='package'?'':' ×'+o.qty}${o.dispute?`<br><span style="font-size:11px;color:var(--warn-deep)">⚠ ${esc(o.dispute)}</span>`:(o.note?`<br><span style="font-size:11px;color:var(--ink-soft)">💬 ${esc(o.note)}</span>`:"")}</td>
        <td>NT$${o.amount.toLocaleString()}</td>
        <td class="mono" style="font-size:12px">${o.accumSec?hmsShort(o.accumSec):(o.status==='serving'?'計時中…':'—')}</td>
        <td>${esc(o.customer)}</td>
        <td>${esc(o.kefuName||'—')}</td>
        <td><button class="btn sm ${o.paid?'ok':'ghost'}" onclick="db.ref(ROOT+'/orders/${id}').update({paid:${!o.paid},paidAt:${o.paid?'null':'firebase.database.ServerValue.TIMESTAMP'}})">${o.paid?'已付款':'未付款'}</button></td>
        <td><select onchange="db.ref(ROOT+'/orders/${id}/status').set(this.value)" class="${o.status==='disputed'?'':''}">${Object.entries(PROG).map(([k,v])=>`<option value="${k}" ${k===o.status?'selected':''}>${v}</option>`).join("")}</select></td>
        <td><button class="btn sm ghost" onclick="delOrder('${id}','${o.no}')">刪</button></td>
      </tr>`).join("")}</table>`
    : `<div class="empty">這個條件下沒有單</div>`}
    <p class="hint">付款欄可直接點切換（跟客服頁同步）。進度欄可手動改。建錯或取消的單可按「刪」移除（會確認）。</p>
  </div>`;
}
function delOrder(id,no){
  if(!confirm("確定刪除單 "+no+"？此動作無法復原。")) return;
  db.ref(ROOT+"/orders/"+id).remove();
}

/* ---------- 月結 80/20 ---------- */
let sMonth="";
function renderSettle(){
  const ms=months(); if(!sMonth) sMonth=ms[0]||"";
  // 只計入：已付款 + (已完成或已結算)
  const rows={};
  Object.entries(orders).forEach(([id,o])=>{
    if(o.month!==sMonth) return;
    if(!o.paid) return;
    if(!["done","settled"].includes(o.status)) return;
    (rows[o.cid]=rows[o.cid]||{name:o.charName,emoji:chars[o.cid]?chars[o.cid].emoji:'',n:0,total:0});
    rows[o.cid].n++; rows[o.cid].total+=o.amount;
  });
  const entries=Object.entries(rows);
  let grand=0, grandPay=0;
  const body=entries.map(([cidK,r])=>{
    const share=chars[cidK]&&chars[cidK].share!=null?chars[cidK].share:(100-COMPANY_CUT);
    const pay=Math.round(r.total*share/100);
    grand+=r.total; grandPay+=pay;
    return `<tr><td>${r.emoji||''} <b>${esc(r.name)}</b></td><td>${r.n}</td><td>NT$${r.total.toLocaleString()}</td>
      <td>${share}%</td><td><b>NT$${pay.toLocaleString()}</b></td>
      <td><button class="btn sm lav" onclick="settle('${cidK}')">標記已結算</button></td></tr>`;
  }).join("");
  // 待收款警示
  const unpaidWait=Object.values(orders).filter(o=>o.month===sMonth&&!o.paid&&["confirmed","serving","done","pending"].includes(o.status));
  tab1.innerHTML=`<div class="card">
    <div class="filters">
      <select onchange="sMonth=this.value;renderSettle()">${ms.map(m=>`<option ${m===sMonth?'selected':''}>${m}</option>`).join("")}</select>
      <button class="btn sm" onclick="exportCsv()">匯出 CSV 📥</button>
    </div>
    <div class="stat">
      <div><b>${grand.toLocaleString()}</b><span>計入營收</span></div>
      <div><b>${grandPay.toLocaleString()}</b><span>應付陪玩（80%）</span></div>
      <div><b>${(grand-grandPay).toLocaleString()}</b><span>公司留存（20%）</span></div>
    </div>
    ${entries.length? `<table><tr><th>陪玩</th><th>單數</th><th>營收</th><th>分潤</th><th>應付</th><th></th></tr>${body}</table>`
      : `<div class="empty">${sMonth} 還沒有「已付款＋已確認」的單</div>`}
    ${unpaidWaitBlock(unpaidWait)}
    <p class="hint">月結只計入「已付款 ＋ 陪玩已完成計時」的單。客服抽成不在此系統計算，請另行處理。「標記已結算」代表該角色本月分潤已匯出。</p>
  </div>`;
}
function unpaidWaitBlock(list){
  if(!list.length) return "";
  return `<div style="margin-top:12px;padding:10px;border:2px dashed var(--warn);border-radius:12px;background:#FCEEEE">
    <b style="color:var(--warn-deep);font-size:13px">⚠ ${list.length} 筆單尚未收款、暫不列入月結：</b>
    <div style="font-size:12px;color:var(--ink-soft);margin-top:4px">${list.map(o=>`${o.no}（${esc(o.charName)}・NT$${o.amount}）`).join("、")}</div></div>`;
}
function settle(cidK){
  if(!confirm("將該角色本月「已付款＋已完成」的單標記為已結算？（代表分潤已匯出）")) return;
  Object.entries(orders).forEach(([id,o])=>{
    if(o.cid===cidK&&o.month===sMonth&&o.paid&&o.status==="done")
      db.ref(ROOT+"/orders/"+id).update({status:"settled",settledAt:firebase.database.ServerValue.TIMESTAMP});
  });
}
function exportCsv(){
  const list=Object.values(orders).filter(o=>o.month===sMonth).sort((a,b)=>a.createdAt-b.createdAt);
  if(!list.length) return alert("這個月沒有單");
  const head="編號,日期,陪玩,內容,模式,數量,金額,實際時長,客人,客服,付款,進度\n";
  const body=list.map(o=>[o.no,new Date(o.createdAt).toLocaleString("zh-TW"),o.charName,o.serviceName,
    {hour:"小時",round:"局",package:"套餐"}[o.mode]||o.mode,o.qty,o.amount,
    o.accumSec?hmsShort(o.accumSec):"",o.customer,o.kefuName,
    o.paid?"已付款":"未付款",PROG[o.status]||o.status]
    .map(x=>`"${String(x==null?"":x).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+head+body],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`委託帳目_${sMonth}.csv`; a.click();
}

/* ---------- 價目表 ---------- */
function renderSvcs(){
  const list=Object.entries(svcs).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  tab2.innerHTML=`<div class="card">
    <h2>價目表（客服建單頁即時同步）</h2>
    ${list.length? `<table><tr><th>名稱</th><th>計費</th><th>單價</th><th>單位</th><th>上架</th><th></th></tr>
      ${list.map(([id,v])=>`<tr>
        <td>${esc(v.name)}</td><td>${{hour:"按小時",round:"按局",package:"套餐"}[v.mode]||v.mode}</td>
        <td>NT$${v.price}</td><td>${esc(v.unitLabel||"—")}</td>
        <td><button class="btn sm ${v.active?'ok':'ghost'}" onclick="db.ref(ROOT+'/config/services/${id}/active').set(${!v.active})">${v.active?'上架中':'已下架'}</button></td>
        <td><button class="btn sm ghost" onclick="if(confirm('刪除「${esc(v.name)}」？'))db.ref(ROOT+'/config/services/${id}').remove()">刪</button></td>
      </tr>`).join("")}</table>` : `<div class="empty">還沒有價目，先新增或一鍵建立範例</div>`}
    <h2 style="margin-top:16px">新增項目</h2>
    <div class="grid">
      <input id="svName" placeholder="名稱，例：技術陪玩">
      <select id="svMode"><option value="hour">按小時</option><option value="round">按局</option><option value="package">套餐</option></select>
      <input id="svPrice" type="number" placeholder="單價 NT$">
      <input id="svUnit" placeholder="單位字，例：小時／局">
    </div>
    <button class="btn sm" onclick="addSvc()">新增 ＋</button>
    ${list.length? "" : `<button class="btn sm lav" style="margin-left:8px" onclick="seedSvcs()">一鍵建立範例價目表</button>`}
  </div>`;
}
function addSvc(){
  const name=svName.value.trim(), price=Number(svPrice.value);
  if(!name||!price) return alert("名稱和單價都要填");
  db.ref(ROOT+"/config/services").push({name,mode:svMode.value,price,unitLabel:svUnit.value.trim(),active:true,order:Date.now()});
}
function seedSvcs(){
  [["技術陪玩","hour",300,"小時"],["娛樂陪玩","hour",250,"小時"],["排位上分","round",150,"局"],["暢玩套餐 3hr","package",800,""]]
  .forEach(([name,mode,price,unitLabel],i)=>db.ref(ROOT+"/config/services").push({name,mode,price,unitLabel,active:true,order:i}));
}

/* ---------- 角色 ---------- */
function renderChars(){
  const list=Object.entries(chars);
  tab3.innerHTML=`<div class="card">
    <h2>角色名冊（真人身分只存在這裡，客人／客服前台只見角色）</h2>
    ${list.length? `<table><tr><th>角色</th><th>介紹</th><th>PIN</th><th>分潤%</th><th>啟用</th><th></th></tr>
      ${list.map(([id,c])=>`<tr>
        <td>${c.emoji||"✨"} <b>${esc(c.name)}</b></td>
        <td style="font-size:12px;color:var(--ink-soft)">${esc(c.tagline||"")}</td>
        <td class="mono">${esc(c.pin)}</td>
        <td><input type="number" value="${c.share!=null?c.share:80}" style="width:60px" onchange="db.ref(ROOT+'/characters/${id}/share').set(Number(this.value))"></td>
        <td><button class="btn sm ${c.active?'ok':'ghost'}" onclick="db.ref(ROOT+'/characters/${id}/active').set(${!c.active})">${c.active?'啟用中':'停用'}</button></td>
        <td><button class="btn sm ghost" onclick="if(confirm('刪除角色「${esc(c.name)}」？單子紀錄會保留'))db.ref(ROOT+'/characters/${id}').remove()">刪</button></td>
      </tr>`).join("")}</table>` : `<div class="empty">還沒有角色，新增第一位吧</div>`}
    <h2 style="margin-top:16px">新增角色</h2>
    <div class="grid">
      <input id="chEmoji" placeholder="emoji，例：🐰" maxlength="4">
      <input id="chName" placeholder="角色名">
      <input id="chTag" placeholder="一句話介紹">
      <input id="chPin" placeholder="登入 PIN（4-6 碼）" maxlength="6">
      <input id="chShare" type="number" placeholder="分潤%（預設 80）">
    </div>
    <button class="btn sm" onclick="addChar()">新增 ＋</button>
    <p class="hint">PIN 給該角色的陪玩登入「角色手札」用，一人一組不要重複。分潤預設 80%（公司留 20%）。</p>
  </div>`;
}
function addChar(){
  const name=chName.value.trim(), pin=chPin.value.trim();
  if(!name||!pin) return alert("角色名和 PIN 都要填");
  if(Object.values(chars).some(c=>String(c.pin)===pin)) return alert("這組 PIN 已有人用，換一組");
  db.ref(ROOT+"/characters").push({
    name, pin, emoji:chEmoji.value.trim()||"✨", tagline:chTag.value.trim(),
    share:Number(chShare.value)||80, active:true
  });
}

/* ---------- 客服 ---------- */
function renderStaff(){
  const list=Object.entries(staff);
  tab4.innerHTML=`<div class="card">
    <h2>客服名冊（含你和管理，前期都當客服派單）</h2>
    ${list.length? `<table><tr><th>名字</th><th>登入 PIN</th><th>本月派單</th><th>啟用</th><th></th></tr>
      ${list.map(([id,k])=>{
        const now=new Date(); const m=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        const cnt=Object.values(orders).filter(o=>o.kefuId===id&&o.month===m).length;
        return `<tr>
          <td><b>${esc(k.name)}</b></td><td class="mono">${esc(k.pin)}</td><td>${cnt} 筆</td>
          <td><button class="btn sm ${k.active!==false?'ok':'ghost'}" onclick="db.ref(ROOT+'/staff/${id}/active').set(${k.active===false})">${k.active!==false?'啟用中':'停用'}</button></td>
          <td><button class="btn sm ghost" onclick="if(confirm('刪除客服「${esc(k.name)}」？派過的單會保留'))db.ref(ROOT+'/staff/${id}').remove()">刪</button></td>
        </tr>`;
      }).join("")}</table>` : `<div class="empty">還沒有客服，先把你和管理加進來</div>`}
    <h2 style="margin-top:16px">新增客服</h2>
    <div class="grid">
      <input id="kfName" placeholder="名字，例：老闆／管理">
      <input id="kfPin" placeholder="登入 PIN（4-6 碼）" maxlength="6">
    </div>
    <button class="btn sm" onclick="addStaff()">新增 ＋</button>
    <p class="hint">客服用這組 PIN 登入「客服派單台」(kefu.html)。前期把你自己和管理各建一組。</p>
  </div>`;
}
function addStaff(){
  const name=kfName.value.trim(), pin=kfPin.value.trim();
  if(!name||!pin) return alert("名字和 PIN 都要填");
  if(Object.values(staff).some(k=>String(k.pin)===pin)) return alert("這組 PIN 已有人用，換一組");
  db.ref(ROOT+"/staff").push({name,pin,active:true});
}
</script>
